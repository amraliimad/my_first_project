<div class="card">
    <h2>حساب جديد ⚽</h2>
    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div style="color: red; background: #fee; padding: 10px; border-radius: 5px; margin-bottom: 10px;">
                {% for field in form %}
                    {% for error in field.errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                {% endfor %}
            </div>
        {% endif %}

        {{ form.as_p }}
        <button type="submit" class="btn">إنشاء الحساب</button>
    </form>
</div>
