<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - ملاعبك</title>
    <style>
        /* إعدادات الألوان العامة */
        :root {
            --primary-color: #27ae60; /* أخضر الملعب */
            --secondary-color: #2c3e50; /* كحلي غامق */
            --bg-color: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* خلفية خفيفة تعطي إيحاء بالرياضة */
            background-image: linear-gradient(rgba(244, 247, 246, 0.9), rgba(244, 247, 246, 0.9)), 
                              url('https://www.transparenttextures.com/patterns/cubes.png');
        }

        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 8px solid var(--primary-color);
        }

        .login-card h2 {
            color: var(--secondary-color);
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-card p.subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* تنسيق حقول الإدخال الناتجة عن Django form.as_p */
        form p {
            text-align: right;
            margin-bottom: 20px;
        }

        form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--secondary-color);
        }

        form input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box; /* لضمان عدم خروج الإدخال عن الكارد */
            font-size: 16px;
            transition: all 0.3s ease;
        }

        form input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 8px rgba(39, 174, 96, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #219150;
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* رسائل الخطأ */
        .errorlist {
            list-style: none;
            padding: 0;
            color: #e74c3c;
            font-size: 13px;
            text-align: right;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>تسجيل الدخول ⚽</h2>
        <p class="subtitle">مرحباً بك مجدداً في نظام حجز الملاعب</p>

        <form method="post">
            {% csrf_token %}
            
            {# هذا الجزء سيقوم بتنسيق فورم ديجانجو تلقائياً #}
            {{ form.as_p }}

            <button type="submit" class="btn-login">دخول للمنصة</button>
        </form>

        <div class="footer-links">
            <p>ليس لديك حساب؟ 
                <a href="{% url 'signup' %}">إنشاء حساب جديد</a>
            </p>
        </div>
    </div>

</body>
</html>
